apiVersion: apps/v1
kind: Deployment
metadata:
  name: poc
spec:
  selector:
    matchLabels:
      app: poc
  replicas: 1
  template:
    metadata:
      labels:
        app: poc
    spec:
      containers:
        - name: poc
          image: nehal76/nehal76-devops-end-to-end-poc:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          
          # Recommended: Prevents your container from consuming too much node memory/CPU
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

          # Recommended: Gives Spring Boot time to start before checking health
          startupProbe:
            tcpSocket:
            
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5 
            failureThreshold: 12

          # Recommended: Keeps checking if the app is still alive
          livenessProbe:
            tcpSocket:
              
              port: 8080
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3


apiVersion: v1
kind: Service
metadata:
  name: poc-ssvc
spec:
  selector:
    app: poc
  ports:
    - protocol: "TCP"
      port: 8080
      targetPort: 8080 
  type: LoadBalancer
